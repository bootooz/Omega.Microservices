services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./acme.json:/acme.json
    networks:
      - zalupa
    labels:
      - "traefik.enable=true"
      # (опционально) Dashboard только с вашей машины
      - "traefik.http.routers.traefik.rule=Host(`traefik.skiwatch.ru`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$apr1$FDf1RdUO$u5BnU8VUI3SValYpekO1B." # generate with htpasswd

networks:
  zalupa:
    external: true