server {
    listen 80;
    server_name skiwatch.ru www.skiwatch.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name skiwatch.ru www.skiwatch.ru;

    ssl_certificate /etc/letsencrypt/live/skiwatch.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skiwatch.ru/privkey.pem;

    root /var/www/public;

    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
    }
    location /spa/ {
        alias /var/www/html/spa/;
        try_files $uri $uri/ /spa/index.html;
    }
    # WebSocket Reverse Proxy for Frontend (wss)
    location /wsbridge/ {
        proxy_pass https://nodebridge:9443/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }
    gzip on;
    gzip_types text/css application/javascript text/javascript application/json application/xml+rss;
    client_max_body_size 32M;
}