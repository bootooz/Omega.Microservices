version: "3.8"
services:
  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/ssl/certs:/etc/nginx/certs:ro
      - ./docker/ssl/vhost.d:/etc/nginx/vhost.d
      - ./docker/ssl/html:/usr/share/nginx/html
    networks:
      - laravel

  letsencrypt:
    image: jrcs/letsencrypt-nginx-proxy-companion
    container_name: letsencrypt
    restart: always
    environment:
      NGINX_PROXY_CONTAINER: nginx-proxy
      ACME_CA_URI: https://acme-staging-v02.api.letsencrypt.org/directory
    depends_on:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/ssl/certs:/etc/nginx/certs
      - ./docker/ssl/vhost.d:/etc/nginx/vhost.d
      - ./docker/ssl/html:/usr/share/nginx/html
    networks:
      - laravel

networks:
  laravel:
    external: true  # чтобы совместно использовать сеть с app/db/nginx